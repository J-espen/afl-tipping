[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Scrape lines every Wednesday 9am AEST = Monday 11pm UTC
[functions."scrape-lines"]
  schedule = "0 23 * * 1"

# Fetch results every Sunday 11pm AEST = Sunday 1pm UTC
[functions."fetch-results"]
  schedule = "0 13 * * 0"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"
